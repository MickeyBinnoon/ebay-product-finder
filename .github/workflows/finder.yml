name: ebay-backup
# OPTIONAL cloud backup: scrape eBay + apply the 5 filters from a datacenter IP
# (proven to work) and upload the qualifying products as a downloadable artifact.
# This runs Mac-independently. The PRIMARY pipeline is the local Mac job
# (run_local.sh), which also matches AliExpress and writes the Google Sheet - that
# part needs a residential IP, which the cloud does not have.
on:
  schedule:
    - cron: '30 5 * * *'   # 05:30 UTC daily
  workflow_dispatch: {}

jobs:
  ebay:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Scrape eBay + apply the 5 filters
        run: |
          Q="massage gun||dash cam||coffee grinder||espresso machine||stand mixer||microwave||blender||air fryer||electric shaver||hair dryer||robot vacuum||projector||security camera||soundbar||electric kettle||food processor||toaster"
          scrapy crawl products -a queries="$Q" -a max_pages=2 \
            -O out/pool.json -s CLOSESPIDER_ITEMCOUNT=160 -s CLOSESPIDER_TIMEOUT=1500
          python curate_finder.py
      - uses: actions/upload-artifact@v4
        with:
          name: qualifying-products
          path: final.json
